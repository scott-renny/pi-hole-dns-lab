# 99-dnssec.conf
#
# Fixes: DNSSEC declared via the DNSSEC=true environment variable was NOT
# actually validating responses in Pi-hole v6 — the "ad" (Authenticated Data)
# flag was missing from dig output, meaning DNS responses were being forwarded
# without cryptographic validation.
#
# See docs/PHASE1-troubleshooting.md, Problem 6, for the full diagnosis.
#
# This file is mounted into the container at /etc/dnsmasq.d/99-dnssec.conf
# via the volumes section of docker-compose.yml.
#
# Verify the fix worked:
#   dig cloudflare.com @127.0.0.1 +dnssec | grep "flags:"
#   Expected: flags: qr rd ra ad;   <- "ad" flag present = validating
#
#   dig dnssec-failed.org @127.0.0.1
#   Expected: status: SERVFAIL      <- tampered/invalid DNSSEC correctly rejected

dnssec
dnssec-check-unsigned
